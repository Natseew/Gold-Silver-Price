<!DOCTYPE html>
<html>
<head>
  <title>Metal Prices</title>
</head>
<body>
  <h1>Live Metal Prices in SGD</h1>

  <div>
    <h2>1 Oz Gold (XAU)</h2>
    <p id="xau-price">Loading...</p>
    <p id="xau-percent"></p>
  </div>

  <div>
    <h2>1 Oz Silver (XAG)</h2>
    <p id="xag-price">Loading...</p>
    <p id="xag-percent"></p>
  </div>

    <div>
        <h2>1kg Silver</h2>
        <p id="xag-latest">Loading...</p>
    </div>

  <button onclick="loadData()">Refresh</button>

    <script>
    async function loadData() {
        try {
        // ===== 1. Spot prices =====
        const res1 = await fetch('/api/prices');
        const data1 = await res1.json();

        if (data1.spotPrices?.XAU) {
            document.getElementById('xau-price').textContent = data1.spotPrices.XAU.value;
            document.getElementById('xau-percent').textContent = data1.spotPrices.XAU.percent;
        }

        if (data1.spotPrices?.XAG) {
            document.getElementById('xag-price').textContent = data1.spotPrices.XAG.value;
            document.getElementById('xag-percent').textContent = data1.spotPrices.XAG.percent;
        }

        // ===== 2. Silver dataSeries =====
        const res2 = await fetch('/api/silver');
        const data2 = await res2.json();

        if (data2.dataSeries && data2.dataSeries.length > 0) {
            const lastPoint = data2.dataSeries[data2.dataSeries.length - 1];
            
            const formatted = lastPoint.v.toLocaleString('en-SG', {
            style: 'currency',
            currency: 'SGD'
            });

            document.getElementById('xag-latest').textContent =
            `Latest (1kg Silver): ${formatted}`;
        }

        } catch (err) {
        console.error(err);
        }
    }

    loadData();
    </script>
</body>
</html>
